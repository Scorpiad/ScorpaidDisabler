<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        #chat-box { width: 350px; height: 400px; border: 1px solid #ccc; overflow-y: auto; background: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .msg { background: #e4e6eb; padding: 8px; margin: 5px 0; border-radius: 15px; width: fit-content; max-width: 80%; font-size: 14px; }
        .controls { display: flex; flex-direction: column; gap: 5px; width: 350px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; background: #0084ff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0073e6; }
    </style>
</head>
<body>

    <h2>Chat Room</h2>

    <div id="chat-box"></div>

    <div class="controls">
        <input type="text" id="username" placeholder="Your Name (Optional)">
        <input type="text" id="message" placeholder="Type a message...">
        <button id="send-btn">Send</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <script src="input.js"></script>
</body>
</html>
